<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Krishna Enterprises</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --ke-green:         #1A3C2E;
      --ke-green-mid:     #2D5C45;
      --ke-green-light:   #E8F5EE;
      --ke-green-dark:    #0D2218;
      --ke-gold:          #B8860B;
      --ke-gold-light:    #FDF6E3;
      --ke-gold-muted:    #D4A843;
      --ke-surface:       #FAFAF8;
      --ke-surface-alt:   #F5F4F0;
      --ke-border:        #E8E6E0;
      --ke-text:          #1C1C1A;
      --ke-text-muted:    #7A7870;
      --ke-whatsapp:      #1DA851;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--ke-surface);
      color: var(--ke-text);
      font-size: 15px;
    }

    h1, h2, .font-brand { font-family: 'Playfair Display', serif; }

    .btn-primary { background-color: var(--ke-green); border-color: var(--ke-green); }
    .btn-primary:hover { background-color: var(--ke-green-mid); border-color: var(--ke-green-mid); }

    .form-control:focus {
      border-color: var(--ke-green-mid);
      box-shadow: 0 0 0 3px rgba(26,60,46,0.10);
    }
  </style>
</head>
<body>
  <div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:linear-gradient(135deg,var(--ke-green-dark),var(--ke-green));">
    <div class="card p-4 p-md-5" style="width:100%;max-width:400px;">
      <div class="text-center mb-4">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" class="mx-auto mb-3">
          <path d="M12 2C6.5 2 3 7 3 12c0 3.5 2 6.5 5 8l1-3c-1.5-1-2.5-2.8-2.5-5
                   0-3.5 2.5-7 5.5-7s5.5 3.5 5.5 7c0 2.2-1 4-2.5 5l1 3c3-1.5 5-4.5
                   5-8 0-5-3.5-10-9.5-10z"
                fill="#A7F3D0"/>
        </svg>
        <h2 class="font-brand mb-1">Krishna Enterprises</h2>
        <p class="text-muted mb-0" style="font-size:13px;">Admin Panel</p>
      </div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <p class="text-danger text-center mt-3 mb-0" id="error" style="font-size:13px;"></p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');
      
      const res = await fetch('/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      
      if (data.success) {
        localStorage.setItem('adminToken', data.token);
        window.location.href = '/admin/dashboard';
      } else {
        error.textContent = data.message;
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
