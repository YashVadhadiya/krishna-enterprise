<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Products</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; margin: 0; }
    .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
    h1 { margin: 0; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; margin-left: 10px; }
    .btn-primary { background: #007bff; color: white; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-success { background: #28a745; color: white; }
    .btn-logout { background: #6c757d; color: white; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #f8f9fa; font-weight: bold; }
    .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; cursor: pointer; }
    .toggle-switch { position: relative; width: 50px; height: 26px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: 0.4s; border-radius: 34px; }
    .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: 0.4s; border-radius: 50%; }
    input:checked + .toggle-slider { background-color: #28a745; }
    input:checked + .toggle-slider:before { transform: translateX(24px); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
    .modal.show { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 8px; width: 500px; max-width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal-content h2 { margin-top: 0; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
    .form-group textarea { height: 80px; resize: vertical; }
    .form-group .info-text { font-size: 12px; color: #666; margin-top: 5px; }
    .image-previews { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .image-previews img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; position: relative; }
    .image-previews .img-wrap { position: relative; }
    .image-previews .remove-img { position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; }
    .file-input { margin-top: 5px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Products</h1>
    <div>
      <button class="btn btn-primary" onclick="openModal()">Add Product</button>
      <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>
  
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Images</th>
        <th>Name</th>
        <th>Slug</th>
        <th>SKU</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="productsTable"></tbody>
  </table>

  <div class="modal" id="productModal">
    <div class="modal-content">
      <h2 id="modalTitle">Add Product</h2>
      <form id="productForm">
        <input type="hidden" id="productId">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="productName" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="productDescription"></textarea>
        </div>
        <div class="form-group">
          <label>Images (max 5)</label>
          <input type="file" id="productImages" class="file-input" multiple accept="image/*">
          <div class="image-previews" id="imagePreviews"></div>
        </div>
        <button type="submit" class="btn btn-success">Save</button>
        <button type="button" class="btn btn-danger" onclick="closeModal()">Cancel</button>
      </form>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) { window.location.href = '/admin'; }

    let productData = {
      id: null,
      name: '',
      description: '',
      images: [],
      newFiles: []
    };

    async function apiCall(url, method = 'GET', body = null) {
      const headers = { 'Authorization': `Bearer ${token}` };
      let options = { method, headers };
      if (body) {
        if (body instanceof FormData) {
          options.body = body;
        } else {
          headers['Content-Type'] = 'application/json';
          options.body = JSON.stringify(body);
        }
      }
      const res = await fetch(url, options);
      const text = await res.text();
      try {
        const data = JSON.parse(text);
        if (!res.ok) throw new Error(data.message || 'API call failed');
        return data;
      } catch (e) {
        throw new Error(text || 'Invalid response');
      }
    }

    async function loadProducts() {
      try {
        const products = await apiCall('/admin/products');
        const tbody = document.getElementById('productsTable');
        tbody.innerHTML = products.map(p => {
          const images = typeof p.images === 'string' ? JSON.parse(p.images) : p.images;
          const imgHtml = images.length 
            ? `<img src="${images[0]}" class="product-img" onclick="alert('Images: ${images.length}')">` 
            : '<div style="width:60px;height:60px;background:#ddd;border-radius:4px;"></div>';
          const isActive = p.is_active ? 1 : 0;
          return `
            <tr>
              <td>${p.id}</td>
              <td>${imgHtml}</td>
              <td>${p.name}</td>
              <td>${p.slug || '-'}</td>
              <td>${p.sku || '-'}</td>
              <td>
                <label class="toggle-switch">
                  <input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleStatus(${p.id}, this.checked)">
                  <span class="toggle-slider"></span>
                </label>
              </td>
              <td>
                <button class="btn btn-primary" onclick='editProduct(${p.id}, "${p.name}", ${JSON.stringify(p.description || '').replace(/"/g, '&quot;')}, ${JSON.stringify(images)})'>Edit</button>
                <button class="btn btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
              </td>
            </tr>
          `;
        }).join('');
      } catch (err) {
        alert('Error loading products: ' + err.message);
      }
    }

    async function toggleStatus(id, isActive) {
      try {
        await apiCall('/admin/products/' + id + '/toggle', 'POST');
        loadProducts();
      } catch (err) {
        alert(err.message);
        loadProducts();
      }
    }

    function openModal(id = null, name = '', description = '', images = []) {
      document.getElementById('productModal').classList.add('show');
      document.getElementById('modalTitle').innerText = id ? 'Edit Product' : 'Add Product';
      document.getElementById('productId').value = id || '';
      document.getElementById('productName').value = name;
      document.getElementById('productDescription').value = description;
      document.getElementById('productImages').value = '';
      
      productData = {
        id: id,
        name: name,
        description: description,
        images: images || [],
        newFiles: []
      };
      renderImagePreviews();
    }

    function closeModal() {
      document.getElementById('productModal').classList.remove('show');
    }

    function renderImagePreviews() {
      const container = document.getElementById('imagePreviews');
      container.innerHTML = productData.images.map((img, i) => `
        <div class="img-wrap">
          <img src="${img}" alt="Preview">
          <button type="button" class="remove-img" onclick="removeImage(${i})">×</button>
        </div>
      `).join('');
    }

    function removeImage(index) {
      const img = productData.images[index];
      if (img && img.startsWith('blob:')) {
        const blobIndex = productData.images.indexOf(img);
        if (blobIndex >= 0 && blobIndex < productData.newFiles.length) {
          productData.newFiles.splice(blobIndex, 1);
        }
      }
      productData.images.splice(index, 1);
      renderImagePreviews();
    }

    function editProduct(id, name, description, images) {
      openModal(id, name, description, images);
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;
      try {
        await apiCall('/admin/products/' + id, 'DELETE');
        loadProducts();
      } catch (err) {
        alert(err.message);
      }
    }

    document.getElementById('productImages').addEventListener('change', function() {
      const files = Array.from(this.files);
      const remaining = 5 - productData.images.length;
      if (files.length > remaining) {
        alert(`Max 5 images. You can add ${remaining} more.`);
        this.value = '';
        return;
      }
      files.forEach(file => {
        productData.newFiles.push(file);
        productData.images.push(URL.createObjectURL(file));
      });
      renderImagePreviews();
      this.value = '';
    });

    document.getElementById('productForm').onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('productId').value;
      const name = document.getElementById('productName').value;
      const description = document.getElementById('productDescription').value;
      
      const formData = new FormData();
      formData.append('name', name);
      formData.append('description', description);
      
      const existingUrls = productData.images.filter(img => !img.startsWith('blob:'));
      formData.append('existingImages', JSON.stringify(existingUrls));
      
      productData.newFiles.forEach(file => {
        formData.append('images', file);
      });
      
      try {
        if (id) {
          await apiCall('/admin/products/' + id, 'POST', formData);
        } else {
          await apiCall('/admin/products', 'POST', formData);
        }
        closeModal();
        loadProducts();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    };

    function logout() {
      localStorage.removeItem('adminToken');
      window.location.href = '/admin';
    }

    loadProducts();
  </script>
</body>
</html>
